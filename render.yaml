# ─────────────────────────────────────────────────────────
#  Render Blueprint — Safarnama (monorepo)
#  Docs: https://render.com/docs/blueprint-spec
#
#  Services:
#    1. safarnama-api   — Express API     (Docker, free tier)
#    2. safarnama-web   — Next.js web     (Docker, free tier)
#    3. safarnama-redis — Key Value/Redis (free tier)
#
#  Database:
#    4. safarnama-db    — PostgreSQL      (free tier, expires 90 days)
#
#  External (set manually via env vars):
#    - Cloudinary, Razorpay, SMTP, Firebase, Google OAuth
#
#  ⚠️  FREE TIER NOTES:
#    - Services spin down after 15 min idle (~60s cold start)
#    - Redis data lost on restart (CacheService degrades gracefully)
#    - PostgreSQL expires after 90 days → migrate to Neon after
#    - 750 instance hours/month across all web services
#
#  DEPLOY STEPS:
#    1. Push this file to GitHub repo root
#    2. Render Dashboard → New → Blueprint → connect repo
#    3. Fill in sync:false secrets when prompted (see inline comments per key below)
#    4. Migrations run automatically via preDeployCommand on every deploy
#
#  COOKIE / AUTH NOTES:
#    NEXT_PUBLIC_API_URL must be the *frontend* domain, not the raw API host.
#    Next.js proxies /api/* → BACKEND_API_URL server-side, keeping cookies same-site.
#    Pointing NEXT_PUBLIC_API_URL directly at the API host makes cookies cross-origin
#    and causes users to be logged out on every request.
# ─────────────────────────────────────────────────────────

services:
  # ── 1. Backend API ─────────────────────────────────────
  - type: web
    name: safarnama-api
    runtime: docker
    dockerfilePath: docker/api.prod.Dockerfile
    dockerContext: .
    plan: free
    region: oregon
    healthCheckPath: /health
    buildFilter:
      paths:
        - apps/api/**
        - packages/shared/**
        - docker/api.prod.Dockerfile
        - package.json
        - package-lock.json

    envVars:
      - key: NODE_ENV
        value: production

      # ── Database (auto-injected from safarnama-db) ────
      - key: DATABASE_URL
        fromDatabase:
          name: safarnama-db
          property: connectionString
      - key: DIRECT_URL
        fromDatabase:
          name: safarnama-db
          property: connectionString

      # ── Redis (auto-injected from safarnama-redis) ────
      - key: REDIS_URL
        fromService:
          type: keyvalue
          name: safarnama-redis
          property: connectionString

      # ── Logging ───────────────────────────────────────
      - key: LOG_LEVEL
        value: info

  # ── 2. Frontend Web ────────────────────────────────────
  - type: web
    name: safarnama-web
    runtime: docker
    dockerfilePath: docker/web.prod.Dockerfile
    dockerContext: .
    plan: free
    region: oregon

    buildFilter:
      paths:
        - apps/web/**
        - packages/shared/**
        - docker/web.prod.Dockerfile
        - package.json
        - package-lock.json

    envVars:
      - key: NEXT_PUBLIC_API_URL
        sync: false   # your frontend domain + /api/v1 — must NOT be the raw API host (see COOKIE/AUTH NOTES)
      - key: BACKEND_API_URL
        sync: false   # your API service URL — used server-side by the Next.js proxy; changing this requires a full rebuild
      - key: NEXT_PUBLIC_SOCKET_URL
        sync: false   # your API service URL — used for Socket.IO connections
      - key: API_URL_INTERNAL
        sync: false   # http://safarnama-api:10000
      - key: NEXT_PUBLIC_APP_NAME
        value: Safarnama
      - key: NEXT_PUBLIC_SITE_URL
        sync: false   # https://safarnama-web.onrender.com
      - key: NEXT_PUBLIC_GOOGLE_CLIENT_ID
        sync: false
      - key: NEXT_PUBLIC_FIREBASE_API_KEY
        sync: false
      - key: NEXT_PUBLIC_FIREBASE_AUTH_DOMAIN
        sync: false
      - key: NEXT_PUBLIC_FIREBASE_PROJECT_ID
        sync: false
      - key: NEXT_PUBLIC_FIREBASE_APP_ID
        sync: false
      - key: NEXT_PUBLIC_PHONE_AUTH_STRATEGY
        value: backend
      - key: NEXT_PUBLIC_LOG_LEVEL
        value: warn

      # ── Sentry (optional — omit DSN to disable) ───────
      # ⚠️  NEXT_PUBLIC_* vars are baked at Docker build time (not runtime).
      #     After setting this, trigger a manual redeploy to rebuild the image.
      - key: NEXT_PUBLIC_SENTRY_DSN
        sync: false   # paste your Sentry project DSN from sentry.io
      - key: NEXT_PUBLIC_SENTRY_TRACES_SAMPLE_RATE
        value: "0.2"
      - key: SENTRY_AUTH_TOKEN
        sync: false   # optional: enables source map upload for readable stack traces

  # ── 3. Redis (Key Value) ───────────────────────────────
  # ⚠️  If you already have a free Key Value instance, rename it to
  #     "safarnama-redis" in Render Dashboard → it will be adopted, not duplicated.
  - type: keyvalue
    name: safarnama-redis
    plan: free
    region: oregon
    maxmemoryPolicy: allkeys-lru
    ipAllowList: []

databases:
  # ── 4. PostgreSQL ──────────────────────────────────────
  # ⚠️  Free tier expires after 90 days. After expiry:
  #     1. Export data from Render
  #     2. Migrate to Neon (free forever)
  #     3. Replace fromDatabase refs above with sync:false + paste Neon URL
  - name: safarnama-db
    plan: free
    region: oregon
    databaseName: safarnama
    user: safarnama
