worker_processes auto;
error_log /var/log/nginx/error.log warn;
pid /var/run/nginx.pid;

events {
    worker_connections 1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    # ── Logging ──────────────────────────────────────
    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_referer" '
                    '"$http_user_agent" '
                    'rt=$request_time urt=$upstream_response_time cache=$upstream_cache_status';

    access_log /var/log/nginx/access.log main;

    # ── Performance ──────────────────────────────────
    sendfile        on;
    tcp_nopush      on;
    tcp_nodelay     on;
    keepalive_timeout 65;
    types_hash_max_size 2048;

    # ── Gzip Compression ────────────────────────────
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_min_length 256;
    gzip_types
        text/plain
        text/css
        text/xml
        text/javascript
        application/json
        application/javascript
        application/xml
        application/rss+xml
        image/svg+xml;

    # ── Client body size (matches Express 1MB json limit)
    # Images go direct to Cloudinary — no large uploads through Nginx
    client_max_body_size 1m;

    # ── Proxy cache for SSR pages ──────────────────────
    proxy_cache_path /var/cache/nginx/ssr levels=1:2 keys_zone=ssr_cache:10m
                     max_size=100m inactive=10m use_temp_path=off;

    # ── Proxy buffer tuning for SSR responses ────────
    proxy_buffer_size   128k;
    proxy_buffers       4 256k;
    proxy_busy_buffers_size 256k;

    # ── Server blocks ────────────────────────────────
    include /etc/nginx/conf.d/*.conf;
}
