# Requires Docker Compose v2.24.0+ (for env_file required: false)
services:
  # ── PostgreSQL ───────────────────────────────────────
  postgres:
    image: postgres:15-alpine3.20
    container_name: travel-postgres
    restart: unless-stopped
    ports:
      - '5432:5432'
    environment:
      POSTGRES_USER: travel_user
      POSTGRES_PASSWORD: travel_pass
      POSTGRES_DB: travel_dev
    volumes:
      - pgdata:/var/lib/postgresql/data
    shm_size: 48m
    # ⚠️ DEV ONLY — disables durability for speed; never use in staging/prod
    # shared_buffers=32MB (vs default 128MB), work_mem=4MB — sufficient for dev workloads
    command: postgres -c fsync=off -c full_page_writes=off -c synchronous_commit=off -c shared_buffers=32MB -c work_mem=4MB
    deploy:
      resources:
        limits:
          # ~1.5× expected peak (~120MB): shared_buffers 32MB + work_mem × connections + OS overhead
          memory: 192M
          cpus: '0.5'
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U travel_user -d travel_dev']
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - backend

  # ── Redis ────────────────────────────────────────────
  redis:
    image: redis:7-alpine3.20
    container_name: travel-redis
    restart: unless-stopped
    ports:
      - '6379:6379'
    # maxmemory 32mb is plenty for dev cache (sessions, OTP codes, rate-limit counters)
    command: redis-server --requirepass dev-redis-pass --maxmemory 32mb --maxmemory-policy allkeys-lru --save ""
    tmpfs:
      - /data
    deploy:
      resources:
        limits:
          # ~1.6× peak (~50MB): 32mb data + ~18MB process/buffers
          memory: 80M
          cpus: '0.25'
    healthcheck:
      test: ['CMD-SHELL', 'REDISCLI_AUTH=dev-redis-pass redis-cli ping']
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - backend

  # ── Backend API ──────────────────────────────────────
  api:
    image: travel-api:dev
    build:
      context: .
      dockerfile: docker/api.Dockerfile
    container_name: travel-api
    restart: unless-stopped
    ports:
      - '4001:4000'
    env_file:
      - path: .env.docker
        required: false
    environment:
      NODE_ENV: development
      PORT: 4000
      DATABASE_URL: postgresql://travel_user:travel_pass@postgres:5432/travel_dev?schema=public
      DIRECT_URL: postgresql://travel_user:travel_pass@postgres:5432/travel_dev?schema=public
      JWT_SECRET: docker-dev-jwt-secret-min-32-chars-long
      JWT_REFRESH_SECRET: docker-dev-refresh-secret-min-32-chars
      REDIS_URL: redis://:dev-redis-pass@redis:6379
      CLIENT_URL: ${CLIENT_URL:-http://localhost:3000}
      LOG_LEVEL: debug
      # OTP / Email / Firebase — loaded from .env.docker
      MSG91_AUTH_KEY: ${MSG91_AUTH_KEY:-}
      MSG91_TEMPLATE_ID: ${MSG91_TEMPLATE_ID:-}
      SMTP_HOST: ${SMTP_HOST:-}
      SMTP_PORT: ${SMTP_PORT:-}
      SMTP_USER: ${SMTP_USER:-}
      SMTP_PASS: ${SMTP_PASS:-}
      SMTP_FROM: ${SMTP_FROM:-}
      FIREBASE_PROJECT_ID: ${FIREBASE_PROJECT_ID:-}
      FIREBASE_CLIENT_EMAIL: ${FIREBASE_CLIENT_EMAIL:-}
      FIREBASE_PRIVATE_KEY: ${FIREBASE_PRIVATE_KEY:-}
      PHONE_AUTH_STRATEGY: ${PHONE_AUTH_STRATEGY:-backend}
    volumes:
      - ./apps/api/src:/app/apps/api/src
      - ./apps/api/prisma:/app/apps/api/prisma
      - ./apps/api/tests:/app/apps/api/tests
      - ./apps/api/.env:/app/apps/api/.env:ro
      - ./packages/shared/src:/app/packages/shared/src
    deploy:
      resources:
        limits:
          # 1.75× V8 heap (256MB): covers Prisma query engine (~14MB) + --watch file watchers + native buffers
          memory: 448M
          cpus: '1'
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ['CMD-SHELL', 'wget -qO /dev/null http://localhost:4000/health']
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 45s
    networks:
      - frontend
      - backend

  # ── Frontend Web ─────────────────────────────────────
  web:
    build:
      context: .
      dockerfile: docker/web.Dockerfile
    container_name: travel-web
    restart: unless-stopped
    ports:
      - '${WEB_PORT:-3000}:${WEB_PORT:-3000}'
    env_file:
      - path: .env.docker
        required: false
    environment:
      PORT: ${WEB_PORT:-3000}
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost:4001/api/v1}
      NEXT_PUBLIC_SOCKET_URL: ${NEXT_PUBLIC_SOCKET_URL:-http://localhost:4001}
      NEXT_PUBLIC_SITE_URL: ${NEXT_PUBLIC_SITE_URL:-http://localhost:3000}
      NEXT_PUBLIC_GOOGLE_CLIENT_ID: ${NEXT_PUBLIC_GOOGLE_CLIENT_ID:-}
      # Firebase Client SDK (phone auth)
      NEXT_PUBLIC_FIREBASE_API_KEY: ${NEXT_PUBLIC_FIREBASE_API_KEY:-}
      NEXT_PUBLIC_FIREBASE_AUTH_DOMAIN: ${NEXT_PUBLIC_FIREBASE_AUTH_DOMAIN:-}
      NEXT_PUBLIC_FIREBASE_PROJECT_ID: ${NEXT_PUBLIC_FIREBASE_PROJECT_ID:-}
      NEXT_PUBLIC_FIREBASE_APP_ID: ${NEXT_PUBLIC_FIREBASE_APP_ID:-}
      NEXT_PUBLIC_PHONE_AUTH_STRATEGY: ${NEXT_PUBLIC_PHONE_AUTH_STRATEGY:-backend}
      NEXT_PUBLIC_LOG_LEVEL: ${NEXT_PUBLIC_LOG_LEVEL:-debug}
      # Server-side env for SSR / route handlers (resolves inside Docker network)
      API_URL_INTERNAL: http://api:4000/api/v1
      NEXT_TELEMETRY_DISABLED: 1
    volumes:
      - ./apps/web/src:/app/apps/web/src
      - ./packages/shared/src:/app/packages/shared/src
      - nextcache:/app/apps/web/.next
    deploy:
      resources:
        limits:
          memory: 3072M
          cpus: '0.75'
    healthcheck:
      test: ['CMD-SHELL', 'wget -qO /dev/null http://localhost:${WEB_PORT:-3000} || exit 1']
      interval: 20s
      timeout: 30s
      retries: 5
      start_period: 30s
    depends_on:
      api:
        condition: service_healthy
    networks:
      - frontend

  # ── Seed (run once, then exit) ──────────────────────
  seed:
    image: travel-api:dev
    container_name: travel-seed
    environment:
      DATABASE_URL: postgresql://travel_user:travel_pass@postgres:5432/travel_dev?schema=public
      DIRECT_URL: postgresql://travel_user:travel_pass@postgres:5432/travel_dev?schema=public
    command: ['/app/node_modules/.bin/tsx', 'prisma/seed.ts']
    working_dir: /app/apps/api
    volumes:
      - ./apps/api/prisma:/app/apps/api/prisma
    profiles: ['seed']
    deploy:
      resources:
        limits:
          memory: 256M
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - backend

  # ── Seed Prod (run once, then exit) ────────────────
  seed-prod:
    image: travel-api:dev
    container_name: travel-seed-prod
    environment:
      DATABASE_URL: postgresql://travel_user:travel_pass@postgres:5432/travel_dev?schema=public
      DIRECT_URL: postgresql://travel_user:travel_pass@postgres:5432/travel_dev?schema=public
    command: ['/app/node_modules/.bin/tsx', 'prisma/seed.prod.ts']
    working_dir: /app/apps/api
    volumes:
      - ./apps/api/prisma:/app/apps/api/prisma
    profiles: ['seed-prod']
    deploy:
      resources:
        limits:
          memory: 256M
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - backend

volumes:
  pgdata:
  nextcache:

networks:
  frontend:
    driver: bridge
  backend:
    driver: bridge
