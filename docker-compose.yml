# Requires Docker Compose v2.24.0+ (for env_file required: false)
services:
  # ── PostgreSQL ───────────────────────────────────────
  postgres:
    image: postgres:15-alpine3.20
    container_name: travel-postgres
    restart: unless-stopped
    ports:
      - '5432:5432'
    environment:
      POSTGRES_USER: travel_user
      POSTGRES_PASSWORD: travel_pass
      POSTGRES_DB: travel_dev
    volumes:
      - pgdata:/var/lib/postgresql/data
    shm_size: 64m
    # ⚠️ DEV ONLY — disables durability for speed; never use in staging/prod
    command: postgres -c fsync=off -c full_page_writes=off -c synchronous_commit=off
    deploy:
      resources:
        limits:
          memory: 256M
          cpus: '0.5'
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U travel_user -d travel_dev']
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - backend

  # ── Redis ────────────────────────────────────────────
  redis:
    image: redis:7-alpine3.20
    container_name: travel-redis
    restart: unless-stopped
    ports:
      - '6379:6379'
    command: redis-server --requirepass dev-redis-pass --maxmemory 64mb --maxmemory-policy allkeys-lru --save ""
    tmpfs:
      - /data
    deploy:
      resources:
        limits:
          memory: 96M
          cpus: '0.25'
    healthcheck:
      test: ['CMD-SHELL', 'REDISCLI_AUTH=dev-redis-pass redis-cli ping']
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - backend

  # ── Backend API ──────────────────────────────────────
  api:
    image: travel-api:dev
    build:
      context: .
      dockerfile: docker/api.Dockerfile
    container_name: travel-api
    restart: unless-stopped
    ports:
      - '4000:4000'
    env_file:
      - path: .env.docker
        required: false
    environment:
      NODE_ENV: development
      PORT: 4000
      DATABASE_URL: postgresql://travel_user:travel_pass@postgres:5432/travel_dev?schema=public
      JWT_SECRET: docker-dev-jwt-secret-min-32-chars-long
      JWT_REFRESH_SECRET: docker-dev-refresh-secret-min-32-chars
      REDIS_URL: redis://:dev-redis-pass@redis:6379
      CLIENT_URL: http://localhost:3000
      LOG_LEVEL: debug
    volumes:
      - ./apps/api/src:/app/apps/api/src
      - ./apps/api/prisma:/app/apps/api/prisma
      - ./apps/api/tests:/app/apps/api/tests
      - ./apps/api/.env:/app/apps/api/.env:ro
      - ./packages/shared/src:/app/packages/shared/src
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: '1'
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ['CMD-SHELL', 'wget -qO /dev/null http://localhost:4000/health']
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    networks:
      - frontend
      - backend

  # ── Frontend Web ─────────────────────────────────────
  web:
    build:
      context: .
      dockerfile: docker/web.Dockerfile
    container_name: travel-web
    restart: unless-stopped
    ports:
      - '3000:3000'
    env_file:
      - path: .env.docker
        required: false
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:4000/api/v1
      # Server-side env for SSR / route handlers (resolves inside Docker network)
      API_URL_INTERNAL: http://api:4000/api/v1
      NEXT_TELEMETRY_DISABLED: 1
    volumes:
      - ./apps/web/src:/app/apps/web/src
      - ./packages/shared/src:/app/packages/shared/src
      - nextcache:/app/apps/web/.next
    deploy:
      resources:
        limits:
          memory: 768M
          cpus: '1'
    depends_on:
      api:
        condition: service_healthy
    networks:
      - frontend

  # ── Prisma Migrate (run once, then exit) ─────────────
  migrate:
    image: travel-api:dev
    container_name: travel-migrate
    environment:
      DATABASE_URL: postgresql://travel_user:travel_pass@postgres:5432/travel_dev?schema=public
    command: ['/app/node_modules/.bin/prisma', 'migrate', 'deploy']
    profiles: ['migrate']
    deploy:
      resources:
        limits:
          memory: 256M
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - backend

  # ── Seed (run once, then exit) ──────────────────────
  seed:
    image: travel-api:dev
    container_name: travel-seed
    environment:
      DATABASE_URL: postgresql://travel_user:travel_pass@postgres:5432/travel_dev?schema=public
    command: ['/app/node_modules/.bin/tsx', 'prisma/seed.ts']
    working_dir: /app/apps/api
    profiles: ['seed']
    deploy:
      resources:
        limits:
          memory: 256M
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - backend

volumes:
  pgdata:
  nextcache:

networks:
  frontend:
    driver: bridge
  backend:
    driver: bridge
