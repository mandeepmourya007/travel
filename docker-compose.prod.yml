# ── Production Docker Compose ─────────────────────────
# Standalone file (NOT an override). Used with: --env-file .env.prod
# Usage: docker compose --env-file .env.prod -f docker-compose.prod.yml up -d
#
# Requires Docker Compose v2.24.0+
#
# Database: set DATABASE_URL and DIRECT_URL in .env.prod
#   Local Postgres:  start with --profile db, set URL to postgres://travel:<pw>@postgres:5432/travel
#   External (Neon):  just set the Neon URL, don't start the db profile

services:
  # ── PostgreSQL (optional — start with --profile db) ─
  postgres:
    image: postgres:15-alpine
    container_name: travel-postgres-prod
    restart: unless-stopped
    profiles: ['db']
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-travel}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-}
      POSTGRES_DB: ${POSTGRES_DB:-travel}
    volumes:
      - pgdata:/var/lib/postgresql/data
    deploy:
      resources:
        limits:
          memory: 256M
          cpus: '0.5'
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U ${POSTGRES_USER:-travel}']
      interval: 10s
      timeout: 5s
      retries: 5
    logging:
      driver: local
      options:
        max-size: '10m'
        max-file: '5'
    networks:
      - prodnet

  # ── Redis ────────────────────────────────────────────
  redis:
    image: redis:7-alpine3.20
    container_name: travel-redis-prod
    restart: unless-stopped
    command:
      - redis-server
      - --requirepass
      - ${REDIS_PASSWORD:?REDIS_PASSWORD must be set}
      - --maxmemory
      - 128mb
      - --maxmemory-policy
      - volatile-lru
      - --save
      - '60'
      - '1'
      - --appendonly
      - yes
    volumes:
      - redisdata:/data
    deploy:
      resources:
        limits:
          memory: 192M
          cpus: '0.5'
    healthcheck:
      test: ['CMD-SHELL', 'REDISCLI_AUTH=$REDIS_PASSWORD redis-cli ping']
      interval: 10s
      timeout: 5s
      retries: 5
    logging:
      driver: local
      options:
        max-size: '10m'
        max-file: '5'
    networks:
      - prodnet

  # ── Backend API ──────────────────────────────────────
  api:
    build:
      context: .
      dockerfile: docker/api.prod.Dockerfile
    image: travel-api:prod
    container_name: travel-api-prod
    restart: unless-stopped
    ports:
      - '127.0.0.1:4001:4000'
    dns:
      - 8.8.8.8
      - 8.8.4.4
    env_file:
      - .env.prod
    environment:
      NODE_ENV: production
      PORT: 4000
      DATABASE_URL: ${DATABASE_URL}
      DIRECT_URL: ${DIRECT_URL}
      REDIS_URL: redis://:${REDIS_PASSWORD}@redis:6379
      LOG_LEVEL: info
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: '1'
    depends_on:
      redis:
        condition: service_healthy
      postgres:
        condition: service_healthy
        required: false
    healthcheck:
      test: ['CMD-SHELL', 'wget -qO /dev/null http://localhost:4000/health']
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 60s
    logging:
      driver: local
      options:
        max-size: '10m'
        max-file: '5'
    networks:
      - prodnet

  # ── Frontend Web ─────────────────────────────────────
  web:
    build:
      context: .
      dockerfile: docker/web.prod.Dockerfile
      args:
        # deploy-prod.sh starts the API before this build so --network=host can reach it
        API_URL_INTERNAL: http://127.0.0.1:4001/api/v1
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL}
        NEXT_PUBLIC_SOCKET_URL: ${NEXT_PUBLIC_SOCKET_URL}
        NEXT_PUBLIC_APP_NAME: ${NEXT_PUBLIC_APP_NAME:-Safarnama}
        NEXT_PUBLIC_SITE_URL: ${NEXT_PUBLIC_SITE_URL}
        NEXT_PUBLIC_GOOGLE_CLIENT_ID: ${NEXT_PUBLIC_GOOGLE_CLIENT_ID:-}
        NEXT_PUBLIC_FIREBASE_API_KEY: ${NEXT_PUBLIC_FIREBASE_API_KEY:-}
        NEXT_PUBLIC_FIREBASE_AUTH_DOMAIN: ${NEXT_PUBLIC_FIREBASE_AUTH_DOMAIN:-}
        NEXT_PUBLIC_FIREBASE_PROJECT_ID: ${NEXT_PUBLIC_FIREBASE_PROJECT_ID:-}
        NEXT_PUBLIC_FIREBASE_APP_ID: ${NEXT_PUBLIC_FIREBASE_APP_ID:-}
        NEXT_PUBLIC_PHONE_AUTH_STRATEGY: ${NEXT_PUBLIC_PHONE_AUTH_STRATEGY:-backend}
        NEXT_PUBLIC_LOG_LEVEL: ${NEXT_PUBLIC_LOG_LEVEL:-warn}
    image: travel-web:prod
    container_name: travel-web-prod
    restart: unless-stopped
    ports:
      - '127.0.0.1:3001:${WEB_PORT:-3000}'
    dns:
      - 8.8.8.8
      - 8.8.4.4
    environment:
      NODE_ENV: production
      PORT: ${WEB_PORT:-3000}
      HOSTNAME: '0.0.0.0'
      API_URL_INTERNAL: http://api:4000/api/v1
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: '1'
    depends_on:
      api:
        condition: service_healthy
    healthcheck:
      test: ['CMD-SHELL', 'wget -qO /dev/null http://127.0.0.1:${WEB_PORT:-3000} || exit 1']
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 120s
    logging:
      driver: local
      options:
        max-size: '10m'
        max-file: '5'
    networks:
      - prodnet

  # ── Nginx (Reverse Proxy) ───────────────────────────
  nginx:
    image: nginx:1.27-alpine
    container_name: travel-nginx-prod
    restart: unless-stopped
    ports:
      - '80:80'
      - '443:443'
    environment:
      SERVER_NAME: ${SERVER_NAME:-_}
      WEB_PORT: ${WEB_PORT:-3000}
    volumes:
      - ./docker/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./docker/nginx/templates:/etc/nginx/templates:ro
      - certbot_www:/var/www/certbot:ro
      - certbot_certs:/etc/letsencrypt:ro
    tmpfs:
      - /var/cache/nginx:size=128M
    deploy:
      resources:
        limits:
          memory: 256M
          cpus: '0.5'
    depends_on:
      api:
        condition: service_healthy
      web:
        condition: service_healthy
    healthcheck:
      test: ['CMD-SHELL', 'wget -qO /dev/null http://127.0.0.1/health || exit 1']
      interval: 10s
      timeout: 3s
      retries: 3
      start_period: 10s
    logging:
      driver: local
      options:
        max-size: '10m'
        max-file: '5'
    networks:
      - prodnet

  # ── Certbot (manual trigger only) ───────────────────
  certbot:
    image: certbot/certbot
    container_name: travel-certbot
    profiles: ['certbot']
    volumes:
      - certbot_www:/var/www/certbot
      - certbot_certs:/etc/letsencrypt
    networks:
      - prodnet

  # ── Prisma Migrate (run by deploy script) ───────────
  migrate:
    image: travel-api:prod
    container_name: travel-migrate-prod
    environment:
      DATABASE_URL: ${DATABASE_URL}
      DIRECT_URL: ${DIRECT_URL}
    command: ['npx', '--yes', 'prisma@5', 'migrate', 'deploy']
    working_dir: /app/apps/api
    profiles: ['migrate']
    depends_on:
      postgres:
        condition: service_healthy
        required: false
    deploy:
      resources:
        limits:
          memory: 256M
    logging:
      driver: local
      options:
        max-size: '10m'
        max-file: '3'
    networks:
      - prodnet

  # ── Seed (run by deploy script) ─────────────────────
  seed:
    image: travel-api:prod
    container_name: travel-seed-prod
    environment:
      DATABASE_URL: ${DATABASE_URL}
      DIRECT_URL: ${DIRECT_URL}
    command: ['node', '--import=tsx', 'prisma/seed.prod.ts']
    working_dir: /app/apps/api
    profiles: ['seed']
    depends_on:
      postgres:
        condition: service_healthy
        required: false
    deploy:
      resources:
        limits:
          memory: 256M
    logging:
      driver: local
      options:
        max-size: '10m'
        max-file: '3'
    networks:
      - prodnet

volumes:
  pgdata:
  redisdata:
  certbot_www:
  certbot_certs:

networks:
  prodnet:
    driver: bridge
