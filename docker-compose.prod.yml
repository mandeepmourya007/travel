# ── Production Docker Compose ─────────────────────────
# Standalone file (NOT an override). Used with: --env-file .env.prod
# Usage: docker compose --env-file .env.prod -f docker-compose.prod.yml up -d
#
# Requires Docker Compose v2.24.0+

services:
  # ── PostgreSQL ───────────────────────────────────────
  postgres:
    image: postgres:15-alpine3.20
    container_name: travel-postgres-prod
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-travel_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB:-travel_prod}
    volumes:
      - pgdata:/var/lib/postgresql/data
    shm_size: 128m
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: '1'
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U $${POSTGRES_USER:-travel_user} -d $${POSTGRES_DB:-travel_prod}']
      interval: 10s
      timeout: 5s
      retries: 5
    logging:
      driver: json-file
      options:
        max-size: '10m'
        max-file: '5'
    networks:
      - prodnet

  # ── Redis ────────────────────────────────────────────
  redis:
    image: redis:7-alpine3.20
    container_name: travel-redis-prod
    restart: unless-stopped
    command:
      - redis-server
      - --requirepass
      - ${REDIS_PASSWORD:?REDIS_PASSWORD must be set}
      - --maxmemory
      - 128mb
      - --maxmemory-policy
      - allkeys-lru
      - --save
      - '60'
      - '1'
      - --appendonly
      - yes
    volumes:
      - redisdata:/data
    deploy:
      resources:
        limits:
          memory: 192M
          cpus: '0.5'
    healthcheck:
      test: ['CMD', 'redis-cli', '-a', '${REDIS_PASSWORD}', 'ping']
      interval: 10s
      timeout: 5s
      retries: 5
    logging:
      driver: json-file
      options:
        max-size: '10m'
        max-file: '5'
    networks:
      - prodnet

  # ── Backend API ──────────────────────────────────────
  api:
    build:
      context: .
      dockerfile: docker/api.prod.Dockerfile
    image: travel-api:prod
    container_name: travel-api-prod
    restart: unless-stopped
    ports:
      - '127.0.0.1:4001:4000'
    env_file:
      - .env.prod
    environment:
      NODE_ENV: production
      PORT: 4000
      DATABASE_URL: postgresql://${POSTGRES_USER:-travel_user}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-travel_prod}?schema=public
      REDIS_URL: redis://:${REDIS_PASSWORD}@redis:6379
      LOG_LEVEL: info
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: '1'
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ['CMD-SHELL', 'wget -qO /dev/null http://localhost:4000/health']
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 30s
    logging:
      driver: json-file
      options:
        max-size: '10m'
        max-file: '5'
    networks:
      - prodnet

  # ── Frontend Web ─────────────────────────────────────
  web:
    build:
      context: .
      dockerfile: docker/web.prod.Dockerfile
      args:
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL}
        NEXT_PUBLIC_SOCKET_URL: ${NEXT_PUBLIC_SOCKET_URL}
        NEXT_PUBLIC_APP_NAME: ${NEXT_PUBLIC_APP_NAME:-TripCompare}
        NEXT_PUBLIC_GOOGLE_CLIENT_ID: ${NEXT_PUBLIC_GOOGLE_CLIENT_ID:-}
        NEXT_PUBLIC_FIREBASE_API_KEY: ${NEXT_PUBLIC_FIREBASE_API_KEY:-}
        NEXT_PUBLIC_FIREBASE_AUTH_DOMAIN: ${NEXT_PUBLIC_FIREBASE_AUTH_DOMAIN:-}
        NEXT_PUBLIC_FIREBASE_PROJECT_ID: ${NEXT_PUBLIC_FIREBASE_PROJECT_ID:-}
        NEXT_PUBLIC_FIREBASE_APP_ID: ${NEXT_PUBLIC_FIREBASE_APP_ID:-}
        NEXT_PUBLIC_PHONE_AUTH_STRATEGY: ${NEXT_PUBLIC_PHONE_AUTH_STRATEGY:-backend}
    image: travel-web:prod
    container_name: travel-web-prod
    restart: unless-stopped
    ports:
      - '127.0.0.1:3001:${WEB_PORT:-3000}'
    environment:
      NODE_ENV: production
      PORT: ${WEB_PORT:-3000}
      HOSTNAME: '0.0.0.0'
      API_URL_INTERNAL: http://api:4000/api/v1
    deploy:
      resources:
        limits:
          memory: 384M
          cpus: '0.5'
    depends_on:
      api:
        condition: service_healthy
    healthcheck:
      test: ['CMD-SHELL', 'wget -qO /dev/null http://127.0.0.1:${WEB_PORT:-3000} || exit 1']
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 120s
    logging:
      driver: json-file
      options:
        max-size: '10m'
        max-file: '5'
    networks:
      - prodnet

  # ── Nginx (Reverse Proxy) ───────────────────────────
  nginx:
    image: nginx:1.27-alpine
    container_name: travel-nginx-prod
    restart: unless-stopped
    ports:
      - '80:80'
      - '443:443'
    environment:
      SERVER_NAME: ${SERVER_NAME:-_}
      WEB_PORT: ${WEB_PORT:-3000}
    volumes:
      - ./docker/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./docker/nginx/templates:/etc/nginx/templates:ro
      - certbot_www:/var/www/certbot:ro
      - certbot_certs:/etc/letsencrypt:ro
    deploy:
      resources:
        limits:
          memory: 128M
          cpus: '0.5'
    depends_on:
      api:
        condition: service_healthy
      web:
        condition: service_healthy
    healthcheck:
      test: ['CMD', 'wget', '-q', '--spider', 'http://localhost/health']
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 10s
    logging:
      driver: json-file
      options:
        max-size: '10m'
        max-file: '5'
    networks:
      - prodnet

  # ── Certbot (manual trigger only) ───────────────────
  certbot:
    image: certbot/certbot
    container_name: travel-certbot
    profiles: ['certbot']
    volumes:
      - certbot_www:/var/www/certbot
      - certbot_certs:/etc/letsencrypt
    networks:
      - prodnet

  # ── Prisma Migrate (run by deploy script) ───────────
  migrate:
    image: travel-api:prod
    container_name: travel-migrate-prod
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-travel_user}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-travel_prod}?schema=public
    command: ['npx', 'prisma', 'migrate', 'deploy']
    working_dir: /app/apps/api
    profiles: ['migrate']
    deploy:
      resources:
        limits:
          memory: 256M
    depends_on:
      postgres:
        condition: service_healthy
    logging:
      driver: json-file
      options:
        max-size: '10m'
        max-file: '3'
    networks:
      - prodnet

  # ── Seed (run by deploy script) ─────────────────────
  seed:
    image: travel-api:prod
    container_name: travel-seed-prod
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-travel_user}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-travel_prod}?schema=public
    command: ['node', '--import=tsx', 'prisma/seed.prod.ts']
    working_dir: /app/apps/api
    profiles: ['seed']
    deploy:
      resources:
        limits:
          memory: 256M
    depends_on:
      postgres:
        condition: service_healthy
    logging:
      driver: json-file
      options:
        max-size: '10m'
        max-file: '3'
    networks:
      - prodnet

volumes:
  pgdata:
  redisdata:
  certbot_www:
  certbot_certs:

networks:
  prodnet:
    driver: bridge
